<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sugiyama Graph</title>
</head>

<body>
  <h1>Computer Science Major Requirements</h1>
  <div class="container">

    <div class="controls">
      <h3>Instructions</h3>
      <p>Hover over a course to see details.<br>
      Check courses you have completed.</p>

      <div class="sidebar-section">
        <h3>Major Prerequisites</h3>

        <div class="sidebar-group">
          <label class="group-header">
            <input type="checkbox" class="group-checkbox" data-group="intro-programming" onchange="handleGroupCheck(this)"/>
            Introductory Programming
          </label>
          <div class="course-list" id="intro-programming"></div>
        </div>

        <div class="sidebar-group">
          <label class="group-header">
            <input type="checkbox" class="group-checkbox" data-group="intro-math" onchange="handleGroupCheck(this)"/>
            Introductory Mathematics
          </label>
          <div class="course-list" id="intro-math"></div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Requirements for the Major</h3>

        <div class="sidebar-group">
          <label class="group-header">
            <input type="checkbox" class="group-checkbox" data-group="math" onchange="handleGroupCheck(this)"/>
            Mathematics Courses
          </label>
          <div class="course-list" id="math"></div>
        </div>

        <div class="sidebar-group">
          <label class="group-header">
            <input type="checkbox" class="group-checkbox" data-group="core" onchange="handleGroupCheck(this)"/>
            Core Courses
          </label>
          <div class="course-list" id="core"></div>
        </div>

        <div class="sidebar-group">
          <label class="group-header">
            <input type="checkbox" class="group-checkbox" data-group="electives"/>
            Electives
          </label>

          <div class="course-list electives-wrapper">

            <div class="sidebar-subgroup">
              <label class="subgroup-header">
                <input type="checkbox" class="group-checkbox" data-group="applications" onchange="handleGroupCheck(this)"/>
                Applications
              </label>
              <div class="course-list" id="applications"></div>
            </div>

            <div class="sidebar-subgroup">
              <label class="subgroup-header">
                <input type="checkbox" class="group-checkbox" data-group="systems" onchange="handleGroupCheck(this)"/>
                Systems
              </label>
              <div class="course-list" id="systems"></div>
            </div>

            <div class="sidebar-subgroup">
              <label class="subgroup-header">
                <input type="checkbox" class="group-checkbox" data-group="theory" onchange="handleGroupCheck(this)"/>
                Theory
              </label>
              <div class="course-list" id="theory"></div>
            </div>

            <div class="sidebar-subgroup">
              <label class="subgroup-header">
                <input type="checkbox" class="group-checkbox" data-group="other" onchange="handleGroupCheck(this)"/>
                Other
              </label>
              <div class="course-list" id="other"></div>
            </div>

          </div>
        </div>

      </div>
    </div>

    <svg id="svg">
      <g transform="translate(10,10)">
        <g id="groups"></g>
        <g id="links"></g>
        <g id="nodes"></g>
        <g id="arrows"></g>
      </g>
    </svg>
  </div>

 
  <script>
    function colorClass(checkbox) {
      const courseId = checkbox.dataset.courseId;
      const checked = checkbox.checked;
      // This already works — targets real node IDs directly
      d3.selectAll("#nodes > g").each(function(d) {
        if (d.data.id === courseId) {
          d3.select(this).select("rect")
            .attr("fill", checked ? "#285841" : "steelblue");
        }
      });
    }
</script>

 
  <script src="js/clusterNodes.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</body>
<footer> Created by Yurdanur Yolcu and Dr. Katy Williams. Summer 2025.   </footer>
</html>
